# .github/workflows/debian_package.yml
name: Build and Upload Debian Package

# ═══════════════════════════════════════════════════════════════
# Workflow Triggers
# ═══════════════════════════════════════════════════════════════
# This workflow runs when:
# 1. The release workflow completes successfully
# 2. Manually triggered via workflow_dispatch
# ───────────────────────────────────────────────────────────────
on:
  workflow_run:
    workflows: ["release"]
    types: [completed]
    branches: [main]
  
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to build packages for (e.g. v0.5.0). Empty = latest release'
        required: false
      upload_to_ppa:
        description: 'Upload to Ubuntu PPA after build'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

# Required permissions for release uploads
permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════════════════════
  # Job: Build Debian Packages
  # ═══════════════════════════════════════════════════════════════
  # Creates .deb packages using pre-built binaries from releases
  # ───────────────────────────────────────────────────────────────
  build-deb:
    name: Build Debian Package (${{ matrix.distro }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    
    # Only run if the release workflow succeeded or manual trigger
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    # Access secrets from "packaging" environment
    environment: packaging
    
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu 22.04 LTS (Jammy) - AMD64
          - distro: jammy
            version: "22.04"
            arch: amd64
            os: ubuntu-22.04
            binary_asset: all-smi-linux-x86_64.tar.gz

          # Ubuntu 22.04 LTS (Jammy) - ARM64
          - distro: jammy
            version: "22.04"
            arch: arm64
            os: ubuntu-22.04-arm
            binary_asset: all-smi-linux-aarch64.tar.gz
          
          # Ubuntu 24.04 LTS (Noble) - AMD64
          - distro: noble
            version: "24.04"
            arch: amd64
            os: ubuntu-24.04
            binary_asset: all-smi-linux-x86_64.tar.gz
          
          # Ubuntu 24.04 LTS (Noble) - ARM64
          - distro: noble
            version: "24.04"
            arch: arm64
            os: ubuntu-24.04-arm
            binary_asset: all-smi-linux-aarch64.tar.gz
          
          # Ubuntu 24.10 (Oracular) - AMD64
          - distro: oracular
            version: "24.10"
            arch: amd64
            os: ubuntu-24.04
            binary_asset: all-smi-linux-x86_64.tar.gz
          
          # Ubuntu 24.10 (Oracular) - ARM64  
          - distro: oracular
            version: "24.10"
            arch: arm64
            os: ubuntu-24.04-arm
            binary_asset: all-smi-linux-aarch64.tar.gz
    
    steps:
    # ───────────────────────────────────────────────────────────────
    # Step 1: Checkout source code
    # ───────────────────────────────────────────────────────────────
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for changelog generation

    # ───────────────────────────────────────────────────────────────
    # Step 2: Determine release tag
    # ───────────────────────────────────────────────────────────────
    - name: Get release tag
      id: get_tag
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
        else
          # Get the latest release tag
          TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName')
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
        fi
      env:
        GH_TOKEN: ${{ github.token }}

    # Regenerate debian/changelog for the requested tag
    - name: Update debian/changelog from release
      run: |
        bash ./debian/update-changelog.sh -d ${{ matrix.distro }} ${{ steps.get_tag.outputs.tag }}
      env:
        GH_TOKEN: ${{ github.token }}

        
    # ───────────────────────────────────────────────────────────────
    # Step 3: Download pre-built binary from release
    # ───────────────────────────────────────────────────────────────
    - name: Download release binary
      run: |
        gh release download "${{ steps.get_tag.outputs.tag }}" \
          --pattern "${{ matrix.binary_asset }}" \
          --output "${{ matrix.binary_asset }}"
        
        # Extract the binary
        tar -xzf "${{ matrix.binary_asset }}"
        
        # Verify the binary exists
        if [ ! -f "all-smi" ]; then
          echo "Error: Binary not found after extraction"
          exit 1
        fi
        
        # Make it executable
        chmod +x all-smi
      env:
        GH_TOKEN: ${{ github.token }}
    
    # ───────────────────────────────────────────────────────────────
    # Step 4: Setup build environment
    # ───────────────────────────────────────────────────────────────
    - name: Install build dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          devscripts \
          debhelper \
          dh-make \
          fakeroot \
          lintian \
          dput \
          gpg \
          dpkg-dev \
          build-essential
    
    # ───────────────────────────────────────────────────────────────
    # Step 5: Prepare for building
    # ───────────────────────────────────────────────────────────────
    - name: Prepare package version
      run: |
        # Get version from release tag (remove 'v' prefix)
        VERSION="${{ steps.get_tag.outputs.tag }}"
        VERSION="${VERSION#v}"
        echo "PACKAGE_VERSION=${VERSION}" >> "$GITHUB_ENV"
        
        # Verify changelog was updated correctly
        head -n 1 debian/changelog | grep -q "${VERSION}-1~${{ matrix.distro }}1" || {
          echo "Error: Changelog version mismatch. Expected ${VERSION}-1~${{ matrix.distro }}1"
          echo "Found: $(head -n 1 debian/changelog)"
          exit 1
        }
    
    # ───────────────────────────────────────────────────────────────
    # Step 6: Prepare architecture-specific build
    # ───────────────────────────────────────────────────────────────
    - name: Prepare for architecture-specific build
      run: |
        # Set target architecture properly in control file
        sed -i '/^Architecture:/c\Architecture: '${{ matrix.arch }} debian/control
        echo "::group::Updated debian/control"
        cat debian/control
        echo "::endgroup::"
    
    # ───────────────────────────────────────────────────────────────
    # Step 7: Import GPG signing key
    # ───────────────────────────────────────────────────────────────
    - name: Import GPG key
      if: github.event.workflow_run.conclusion == 'success' || github.event.inputs.upload_to_ppa == 'true'
      run: |
        # Import the GPG key
        echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
        
        # List the imported key to verify
        gpg --list-secret-keys --keyid-format LONG
        
        # Get the full fingerprint for the key
        FINGERPRINT=$(gpg --list-secret-keys --with-colons | grep '^fpr:' | head -1 | cut -d: -f10)
        echo "Key fingerprint: $FINGERPRINT"
        
        # Trust the key using the full fingerprint
        echo "${FINGERPRINT}:6:" | gpg --import-ownertrust
        
        # Verify the trust level
        gpg --list-keys --with-colons | grep -E '^(pub|uid):' || true
    
    # ───────────────────────────────────────────────────────────────
    # Step 8: Setup for binary package build
    # ───────────────────────────────────────────────────────────────
    - name: Setup for binary build
      run: |
        # Use binary-specific packaging files
        if [ -f debian/control.binary ]; then
          cp debian/control.binary debian/control
        fi
        if [ -f debian/rules.binary ]; then
          cp debian/rules.binary debian/rules
          chmod +x debian/rules
        fi
        
        # Set target architecture in control file
        sed -i '/^Architecture:/c\Architecture: '${{ matrix.arch }} debian/control
    
    # ───────────────────────────────────────────────────────────────
    # Step 9: Build binary package
    # ───────────────────────────────────────────────────────────────
    - name: Build binary package
      run: |
        # Build binary package using the pre-built binary
        dpkg-buildpackage -b -uc -us

    # ───────────────────────────────────────────────────────────────
    # Step 10: Run lintian checks
    # ───────────────────────────────────────────────────────────────
    - name: Check package with lintian
      run: |
        lintian --info --display-level ">=warning" ../*.deb || true


    # ───────────────────────────────────────────────────────────────
    # Step 11: Rename build outputs to custom naming scheme
    # ───────────────────────────────────────────────────────────────
    - name: Rename .deb & friends to policy filenames
      run: |
        set -e
        VER="${{ env.PACKAGE_VERSION }}"
        DIST="${{ matrix.distro }}"
        SERIES="${{ matrix.version }}"
        ARCH="${{ matrix.arch }}"

        mkdir -p artifacts

        for f in ../*_${ARCH}.deb; do
          mv "$f" "artifacts/all-smi_${VER}_ubuntu${SERIES}.${DIST}_${ARCH}.deb"
        done

        for f in ../*_${ARCH}.buildinfo; do
          mv "$f" "artifacts/all-smi_${VER}_ubuntu${SERIES}.${DIST}_${ARCH}.buildinfo"
        done

        if [ "${ARCH}" = "amd64" ]; then
          for f in ../*.dsc ../*.tar.* ../*_source.changes; do
            [ -e "$f" ] || continue
            base=$(basename "$f")
            mv "$f" "artifacts/${base/all-smi_*/all-smi_${VER}_ubuntu${SERIES}.${DIST}_source}"
          done
        fi
        
    # ───────────────────────────────────────────────────────────────
    # Step 12: Build source package (only for amd64 to avoid duplicates)
    # ───────────────────────────────────────────────────────────────
    - name: Build source package
      if: matrix.arch == 'amd64'
      run: |
        # Clean any build artifacts
        rm -f all-smi
        rm -rf target/
        
        # Restore Architecture field to 'any' for source package
        sed -i 's/Architecture: .*/Architecture: any/' debian/control
        
        # For source package, we need minimal rules without cargo dependency
        cat > debian/rules << 'EOF'
        #!/usr/bin/make -f
        
        export DEB_BUILD_MAINT_OPTIONS = hardening=+all
        
        %:
        	dh $@
        
        override_dh_auto_clean:
        	@echo "Source package - skipping clean"
        
        override_dh_auto_configure:
        	@echo "Source package - skipping configure"
        
        override_dh_auto_build:
        	@echo "Source package - will be built on Launchpad"
        
        override_dh_auto_install:
        	@echo "Source package - will be installed on Launchpad"
        
        override_dh_auto_test:
        	@echo "Source package - tests will run on Launchpad"
        EOF
        chmod +x debian/rules
        
        # Configure GPG for non-interactive signing
        export GNUPGHOME=/home/runner/.gnupg
        mkdir -p $GNUPGHOME
        chmod 700 $GNUPGHOME
        
        # Configure gpg-agent for batch mode
        cat > $GNUPGHOME/gpg-agent.conf << 'EOF'
        allow-loopback-pinentry
        default-cache-ttl 300
        max-cache-ttl 3600
        EOF
        
        # Configure gpg for batch mode
        cat > $GNUPGHOME/gpg.conf << 'EOF'
        use-agent
        pinentry-mode loopback
        batch
        no-tty
        EOF
        
        # Restart gpg-agent with new config
        gpgconf --kill gpg-agent || true
        gpg-agent --daemon || true
        
        # Get the full fingerprint for signing
        FINGERPRINT=$(gpg --list-secret-keys --with-colons | grep '^fpr:' | head -1 | cut -d: -f10)
        echo "Using fingerprint: $FINGERPRINT"
        
        # Build source package for PPA without signing first
        dpkg-buildpackage -S -sa -us -uc
        
        # Sign the source package separately with debsign
        echo "Signing source package with debsign..."
        debsign -k"$FINGERPRINT" --no-re-sign ../*.changes
        
        echo "Source package built and signed successfully"
    
    # ───────────────────────────────────────────────────────────────
    # Step 13: Upload to PPA (only source packages from amd64 builds)
    # ───────────────────────────────────────────────────────────────
    - name: Upload to Ubuntu PPA
      if: (github.event.workflow_run.conclusion == 'success' || github.event.inputs.upload_to_ppa == 'true') && matrix.arch == 'amd64'
      run: |
        # Configure dput for PPA upload
        cat > ~/.dput.cf << 'EOF'
        [backend-ai-ppa]
        fqdn = ppa.launchpad.net
        method = ftp
        incoming = ~lablup/ubuntu/backend-ai/
        login = anonymous
        allow_unsigned_uploads = 0
        EOF
        
        # Verify the .changes file exists
        CHANGES_FILE=$(ls ../*_source.changes 2>/dev/null | head -1)
        if [ -z "$CHANGES_FILE" ]; then
          echo "Error: No source .changes file found"
          exit 1
        fi
        
        echo "Uploading $CHANGES_FILE to PPA lablup/backend-ai"
        
        # Upload source package to PPA
        # The PPA will build binary packages for all architectures
        dput backend-ai-ppa "$CHANGES_FILE"
        
        echo "✅ Successfully uploaded to PPA"
        echo "📦 Package will be available at: https://launchpad.net/~lablup/+archive/ubuntu/backend-ai"
    
    # ───────────────────────────────────────────────────────────────
    # Step 14: Upload artifacts
    # ───────────────────────────────────────────────────────────────
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: all-smi_${{ env.PACKAGE_VERSION }}_ubuntu${{ matrix.version }}.${{ matrix.distro }}_${{ matrix.arch }}
        path: artifacts/
        retention-days: 7

    # ───────────────────────────────────────────────────────────────
    # Step 15: Delete existing release artifacts (if any)
    # ───────────────────────────────────────────────────────────────
    - name: Delete existing release artifacts
      if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
      run: |
        # Get list of assets to delete
        TAG="${{ steps.get_tag.outputs.tag }}"
        DIST="${{ matrix.distro }}"
        ARCH="${{ matrix.arch }}"
        
        # Delete existing .deb files for this specific distribution/architecture
        gh release view "$TAG" --json assets -q '.assets[].name' | while read -r asset; do
          if [[ "$asset" == *"ubuntu"*"$DIST"*"$ARCH"*".deb" ]]; then
            echo "Deleting existing asset: $asset"
            gh release delete-asset "$TAG" "$asset" -y || true
          fi
        done
      env:
        GH_TOKEN: ${{ github.token }}
    
    # ───────────────────────────────────────────────────────────────
    # Step 16: Upload new release artifacts
    # ───────────────────────────────────────────────────────────────
    - name: Upload release artifact
      if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_tag.outputs.tag }}
        files: artifacts/*.deb
        # Don't fail if some files don't match the pattern
        fail_on_unmatched_files: false
        # Don't update the "latest" release pointer
        make_latest: false
